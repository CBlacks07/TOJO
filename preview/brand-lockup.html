<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Brand · Logo Lockup</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .card { padding: 28px 32px; }
  .frame {
    border: 1px solid var(--line);
    background: var(--paper);
    padding: 32px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 220px;
  }
  .frame img { max-width: 380px; width: 100%; height: auto; }
  .meta { display: flex; gap: 32px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.04em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="card">
  <div class="muted">Logo lockup · primary</div>
  <div class="frame">
    <img src="../assets/logo-lockup.svg" alt="Patrice Tossavi et associés"/>
  </div>
  <div class="meta">
    <span>Min width 120px</span>
    <span>Clear space = stem height</span>
    <span>Always centered</span>
  </div>
</div>
</body>
</html>
