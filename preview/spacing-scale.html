<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Spacing · Scale</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .scale { display: flex; flex-direction: column; gap: 8px; }
  .row { display: grid; grid-template-columns: 70px 1fr 70px; gap: 16px; align-items: center; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--ink); font-weight: 600; }
  .bar { background: var(--ink); height: 14px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); text-align: right; }
</style>
</head>
<body>
<div class="card">
  <div class="muted">Spacing · 4px base scale</div>
  <div class="scale">
    <div class="row"><span class="name">sp-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
    <div class="row"><span class="name">sp-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
    <div class="row"><span class="name">sp-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
    <div class="row"><span class="name">sp-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
    <div class="row"><span class="name">sp-6</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
    <div class="row"><span class="name">sp-8</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
    <div class="row"><span class="name">sp-12</span><div class="bar" style="width:48px"></div><span class="px">48px</span></div>
    <div class="row"><span class="name">sp-16</span><div class="bar" style="width:64px"></div><span class="px">64px</span></div>
    <div class="row"><span class="name">sp-24</span><div class="bar" style="width:96px"></div><span class="px">96px</span></div>
  </div>
</div>
</body>
</html>
