<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type · Display</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .specimen-xl { font-family: var(--font-display); font-size: 64px; font-weight: 700; line-height: 0.95; letter-spacing: -0.03em; color: var(--ink); }
  .specimen-l  { font-family: var(--font-display); font-size: 38px; font-weight: 600; line-height: 1.1; letter-spacing: -0.02em; color: var(--ink); }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); }
</style>
</head>
<body>
<div class="card">
  <div class="muted">Display · Space Grotesk</div>
  <div class="stack">
    <div class="specimen-xl">Level up.</div>
    <div class="meta">H-display · 88/64px · 700 · -0.03em</div>
  </div>
  <div class="stack">
    <div class="specimen-l">DualSense Edge — sur-mesure.</div>
    <div class="meta">H2 · 38px · 600 · -0.02em</div>
  </div>
</div>
</body>
</html>
