<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Components · Buttons</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .btn {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
    height: 44px;
    padding: 0 22px;
    border: 1px solid transparent;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 140ms cubic-bezier(0.4,0,0.1,1);
  }
  .btn-primary { background: var(--ps-blue); color: white; }
  .btn-primary:hover { background: var(--ps-blue-d); }
  .btn-ghost { background: var(--ink); color: var(--paper); }
  .btn-outline { background: transparent; color: var(--ink); border-color: var(--ink); }
  .btn-volt { background: var(--volt); color: var(--ink); border-color: var(--ink); box-shadow: 0 0 20px rgba(198,255,61,0.4); }
  .btn-link { background: transparent; color: var(--ink); padding: 0 4px; height: auto; border-bottom: 1.5px solid var(--ink); }
  .btn-icon { width: 44px; padding: 0; }
  .btn-sm { height: 34px; padding: 0 14px; font-size: 12px; }
  .btn:disabled, .btn.disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<div class="card">
  <div class="muted">Buttons · sharp corners, display font</div>
  <div class="row">
    <button class="btn btn-primary">Ajouter au panier</button>
    <button class="btn btn-ghost">Voir le produit</button>
    <button class="btn btn-outline">Comparer</button>
    <button class="btn btn-volt">Drop limité</button>
  </div>
  <div class="row">
    <button class="btn btn-primary btn-sm">Acheter</button>
    <button class="btn btn-outline btn-sm">+ Wishlist</button>
    <button class="btn btn-ghost btn-icon" aria-label="cart">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
    </button>
    <button class="btn btn-link">En savoir plus →</button>
    <button class="btn btn-primary disabled">En rupture</button>
  </div>
</div>
</body>
</html>
