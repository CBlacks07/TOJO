<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type · Body</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .row { display: grid; grid-template-columns: 1fr 200px; gap: 24px; align-items: baseline; }
  .lg { font-family: var(--font-body); font-size: 18px; line-height: 1.5; color: var(--ink); }
  .base { font-family: var(--font-body); font-size: 16px; line-height: 1.5; color: var(--ink); }
  .sm { font-family: var(--font-body); font-size: 14px; line-height: 1.5; color: var(--ink-2); }
  .xs { font-family: var(--font-body); font-size: 12px; line-height: 1.5; color: var(--ink-3); font-weight: 500; }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); }
</style>
</head>
<body>
<div class="card">
  <div class="muted">Body · Manrope</div>
  <div class="row"><div class="lg">Manette officielle DualSense, livrée sous 48h.</div><div class="meta">body-lg · 18 / 1.5</div></div>
  <div class="row"><div class="base">Compatible PS5, USB-C inclus, garantie 2 ans constructeur.</div><div class="meta">body · 16 / 1.5</div></div>
  <div class="row"><div class="sm">Livraison gratuite dès 50 €. Retours 30 jours.</div><div class="meta">body-sm · 14 / 1.5</div></div>
  <div class="row"><div class="xs">SKU · DS5-MIDNIGHT-BLK · ref. interne 002184</div><div class="meta">caption · 12 / 500</div></div>
</div>
</body>
</html>
