<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Spacing · Radii</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 88px; height: 64px; background: var(--ink); }
  .name { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--ink); }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); }
</style>
</head>
<body>
<div class="card">
  <div class="muted">Radii · sharp by default</div>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:0"></div><div class="name">r-0</div><div class="px">0px · buttons</div></div>
    <div class="item"><div class="box" style="border-radius:2px"></div><div class="name">r-1</div><div class="px">2px · inputs</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">r-2</div><div class="px">4px · chips</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">r-3</div><div class="px">8px · cards</div></div>
    <div class="item"><div class="box" style="border-radius:999px;width:120px"></div><div class="name">r-pill</div><div class="px">pill · tags</div></div>
  </div>
</div>
</body>
</html>
