<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Colors · Accents</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .accent-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
  .big {
    background: var(--ps-blue);
    color: white;
    padding: 24px 22px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 140px;
  }
  .big .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.75; }
  .big .name  { font-family: var(--font-display); font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }
  .big .hex   { font-family: var(--font-mono); font-size: 13px; font-weight: 500; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .small {
    padding: 14px 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex: 1;
    min-height: 65px;
  }
  .small .name { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; }
  .small .hex  { font-family: var(--font-mono); font-size: 11px; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="muted">Accents · primary action + electric pop</div>
  <div class="accent-row">
    <div class="big">
      <span class="label">Primary accent</span>
      <div>
        <div class="name">PS Blue</div>
        <div class="hex">#0070D1</div>
      </div>
    </div>
    <div class="stack">
      <div class="small" style="background:#0058A6;color:#fff"><span class="name">blue-d (press)</span><span class="hex">#0058A6</span></div>
      <div class="small" style="background:#2E8DDC;color:#fff"><span class="name">blue-l (hover)</span><span class="hex">#2E8DDC</span></div>
      <div class="small" style="background:#E6F1FB;color:#0058A6"><span class="name">blue-50</span><span class="hex">#E6F1FB</span></div>
    </div>
    <div class="stack">
      <div class="small" style="background:#C6FF3D;color:#0E1014;flex:1.3"><span class="name">volt</span><span class="hex">#C6FF3D</span><span style="font-size:10px;font-family:var(--font-mono);opacity:0.7">live · new drop</span></div>
      <div class="small" style="background:#0E1014;color:#C6FF3D"><span class="name">volt on carbon</span><span class="hex">glow</span></div>
    </div>
  </div>
</div>
</body>
</html>
