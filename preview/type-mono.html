<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type · Mono & Eyebrows</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .eyebrow { font-family: var(--font-mono); font-size: 12px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-2); }
  .price { font-family: var(--font-display); font-size: 24px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); font-variant-numeric: tabular-nums; }
  .price-l { font-family: var(--font-display); font-size: 48px; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); font-variant-numeric: tabular-nums; }
  .sku { font-family: var(--font-mono); font-size: 13px; color: var(--ink); font-feature-settings: "tnum"; }
  .row { display: grid; grid-template-columns: 1fr 180px; gap: 24px; align-items: baseline; }
  .meta { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); }
</style>
</head>
<body>
<div class="card">
  <div class="muted">Mono · JetBrains Mono · for prices, SKUs, eyebrows</div>
  <div class="row"><div class="eyebrow">Nouveauté · Drop 04/26</div><div class="meta">eyebrow · 0.18em</div></div>
  <div class="row"><div class="price-l">89,90 €</div><div class="meta">price-large · 48</div></div>
  <div class="row"><div class="price">209,99 €</div><div class="meta">price · 24</div></div>
  <div class="row"><div class="sku">DS5-EDGE-WHT · 002184</div><div class="meta">sku · 13 mono</div></div>
</div>
</body>
</html>
