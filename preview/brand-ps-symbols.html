<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Brand · PS Symbols</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .symbols { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sym {
    border: 1px solid var(--line);
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--paper);
  }
  .sym svg { width: 56px; height: 56px; }
  .sym .name { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); }
  .sym .hex  { font-family: var(--font-mono); font-size: 10px; color: var(--ink); font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="spread">
    <div class="muted">PlayStation symbols · decorative micro-accent</div>
    <div class="muted">Never functional UI</div>
  </div>
  <div class="symbols">
    <div class="sym">
      <svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="26" fill="none" stroke="#1D6FE0" stroke-width="3"/><path d="M19 19 L41 41 M41 19 L19 41" stroke="#1D6FE0" stroke-width="3.5" stroke-linecap="round"/></svg>
      <span class="name">Cross</span><span class="hex">#1D6FE0</span>
    </div>
    <div class="sym">
      <svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="26" fill="none" stroke="#E14B4B" stroke-width="3"/><circle cx="30" cy="30" r="13" fill="none" stroke="#E14B4B" stroke-width="3.5"/></svg>
      <span class="name">Circle</span><span class="hex">#E14B4B</span>
    </div>
    <div class="sym">
      <svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="26" fill="none" stroke="#E64FAE" stroke-width="3"/><rect x="18" y="18" width="24" height="24" fill="none" stroke="#E64FAE" stroke-width="3.5"/></svg>
      <span class="name">Square</span><span class="hex">#E64FAE</span>
    </div>
    <div class="sym">
      <svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="26" fill="none" stroke="#2BB573" stroke-width="3"/><path d="M30 16 L43 41 L17 41 Z" fill="none" stroke="#2BB573" stroke-width="3.5" stroke-linejoin="round"/></svg>
      <span class="name">Triangle</span><span class="hex">#2BB573</span>
    </div>
  </div>
</div>
</body>
</html>
