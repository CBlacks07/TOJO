<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Spacing · Elevation</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { background: #FAFAF7; }
  .card { background: #FAFAF7; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 78px; height: 78px; background: var(--paper); border-radius: 4px; }
  .b1 { box-shadow: 0 1px 2px rgba(14,16,20,0.04), 0 1px 1px rgba(14,16,20,0.03); }
  .b2 { box-shadow: 0 4px 12px rgba(14,16,20,0.06), 0 2px 4px rgba(14,16,20,0.04); }
  .b3 { box-shadow: 0 12px 32px rgba(14,16,20,0.10), 0 4px 8px rgba(14,16,20,0.04); }
  .b4 { box-shadow: 0 24px 60px rgba(14,16,20,0.14), 0 8px 16px rgba(14,16,20,0.06); }
  .bg { box-shadow: 0 0 0 4px rgba(0,112,209,0.18); border: 1px solid var(--ps-blue); }
  .bv { box-shadow: 0 0 24px rgba(198,255,61,0.55); background: #0E1014; }
  .name { font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--ink); }
  .px { font-family: var(--font-mono); font-size: 9px; color: var(--ink-3); text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="muted">Elevation · 4 steps + 2 glows</div>
  <div class="row">
    <div class="item"><div class="box b1"></div><div class="name">sh-1</div><div class="px">resting</div></div>
    <div class="item"><div class="box b2"></div><div class="name">sh-2</div><div class="px">hover</div></div>
    <div class="item"><div class="box b3"></div><div class="name">sh-3</div><div class="px">drawer</div></div>
    <div class="item"><div class="box b4"></div><div class="name">sh-4</div><div class="px">modal</div></div>
    <div class="item"><div class="box bg"></div><div class="name">glow-blue</div><div class="px">focus ring</div></div>
    <div class="item"><div class="box bv"></div><div class="name">glow-volt</div><div class="px">limited drop</div></div>
  </div>
</div>
</body>
</html>
