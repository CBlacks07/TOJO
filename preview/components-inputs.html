<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Components · Inputs</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-2); font-weight: 500; }
  .ipt {
    height: 44px;
    padding: 0 14px;
    border: 1px solid var(--line);
    background: white;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--ink);
    border-radius: 2px;
  }
  .ipt:focus { outline: none; border-color: var(--ps-blue); box-shadow: 0 0 0 4px rgba(0,112,209,0.18); }
  .ipt.focused { border-color: var(--ps-blue); box-shadow: 0 0 0 4px rgba(0,112,209,0.18); }
  .ipt.error { border-color: var(--danger); box-shadow: 0 0 0 4px rgba(209,67,67,0.15); }
  .err { font-family: var(--font-body); font-size: 12px; color: var(--danger); }
  .search {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 44px;
    padding: 0 14px;
    border: 1px solid var(--line);
    background: white;
    border-radius: 2px;
  }
  .search input { border: 0; outline: 0; flex: 1; font-family: var(--font-body); font-size: 14px; background: transparent; }
</style>
</head>
<body>
<div class="card">
  <div class="muted">Inputs · 44px height, focus glow blue</div>
  <div class="grid">
    <div class="field">
      <span class="lbl">Email</span>
      <input class="ipt" placeholder="ton@email.fr" value="patrice@tossavi.fr"/>
    </div>
    <div class="field">
      <span class="lbl">Code promo</span>
      <input class="ipt focused" placeholder="GG2026" value="DROP2026"/>
    </div>
    <div class="field">
      <span class="lbl">Carte</span>
      <input class="ipt error" value="4242 4242 4242 4242"/>
      <span class="err">Numéro de carte invalide.</span>
    </div>
    <div class="field">
      <span class="lbl">Recherche</span>
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5A5E68" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input placeholder="Manette, casque, gourde…"/>
      </div>
    </div>
  </div>
</div>
</body>
</html>
