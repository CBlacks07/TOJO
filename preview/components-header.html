<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Components · Header Nav</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { background: #FAFAF7; }
  .card { background: #FAFAF7; padding: 24px; }
  .header {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 32px;
    background: var(--paper);
    height: 64px;
    padding: 0 20px;
    border-bottom: 1px solid var(--line);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo svg { width: 28px; height: 28px; color: var(--ink); }
  .logo span { font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: 0.18em; color: var(--ink); }
  .nav { display: flex; gap: 26px; }
  .nav a { font-family: var(--font-body); font-size: 14px; font-weight: 500; color: var(--ink); text-decoration: none; }
  .nav a.active { color: var(--ps-blue); }
  .actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: var(--ink); position: relative; }
  .cart-count { position: absolute; top: 4px; right: 4px; background: var(--ps-blue); color: white; font-family: var(--font-mono); font-size: 9px; font-weight: 600; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div class="card">
  <div class="muted">Header · sticky, 72px production / 64px shown</div>
  <div class="header">
    <div class="logo">
      <img src="../assets/logo-mark.svg" alt="" style="width:26px;height:26px"/>
      <span>TOSSAVI</span>
    </div>
    <div class="nav">
      <a href="#" class="active">Manettes</a>
      <a href="#">Casques</a>
      <a href="#">Accessoires</a>
      <a href="#">Merch</a>
      <a href="#">Drops</a>
    </div>
    <div class="actions">
      <button class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button>
      <button class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
      <button class="icon-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
        <span class="cart-count">3</span>
      </button>
    </div>
  </div>
</div>
</body>
</html>
